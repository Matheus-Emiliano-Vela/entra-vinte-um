<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<button onclick="somar()">Somar</button>
<p id="resultado"></p>

<script>
    function somar() {
        const soma = 2 + 3;
        document.getElementById("resultado").textContent = soma;
    }
</script>
</body>
</html>
